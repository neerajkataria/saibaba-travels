
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saibaba Travels — Internal Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --saffron: #f97316;
  --saffron-dark: #c2410c;
  --saffron-light: #fed7aa;
  --bg: #0d0d0d;
  --bg2: #161616;
  --bg3: #1e1e1e;
  --bg4: #262626;
  --border: #2e2e2e;
  --border2: #3a3a3a;
  --text: #f0f0f0;
  --text2: #a0a0a0;
  --text3: #6b6b6b;
  --green: #22c55e;
  --green-bg: #14532d22;
  --red: #ef4444;
  --red-bg: #450a0a22;
  --blue: #3b82f6;
  --blue-bg: #1e3a5f22;
  --amber: #f59e0b;
  --amber-bg: #451a0322;
  --purple: #a855f7;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 220px;
  min-height: 100vh;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}

.sidebar-logo {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo .brand {
  font-size: 15px;
  font-weight: 700;
  color: var(--saffron);
  letter-spacing: 0.3px;
}

.sidebar-logo .sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

.nav-section {
  padding: 12px 8px 4px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  padding-left: 14px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  border-radius: 8px;
  margin: 1px 8px;
  font-size: 14px;
  color: var(--text2);
  transition: all 0.15s;
}

.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--saffron)18; color: var(--saffron); }
.nav-item .icon { font-size: 17px; width: 20px; text-align: center; }

.sidebar-bottom {
  margin-top: auto;
  padding: 12px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text3);
  text-align: center;
}

/* ── MAIN CONTENT ── */
.main {
  margin-left: 220px;
  flex: 1;
  min-height: 100vh;
}

.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.page-title { font-size: 17px; font-weight: 600; }
.page-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

.topbar-actions { display: flex; gap: 10px; align-items: center; }

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-primary { background: var(--saffron); color: white; }
.btn-primary:hover { background: var(--saffron-dark); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid #450a0a; }
.btn-danger:hover { background: #450a0a; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { padding: 7px; width: 34px; height: 34px; justify-content: center; }

.content { padding: 24px; }

/* ── CARDS & LAYOUT ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
}

.stat-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--text); margin-top: 4px; }
.stat-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* ── TABLES ── */
.table-wrap { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tbody tr:hover { background: var(--bg3); }
tbody tr:last-child td { border-bottom: none; }

/* ── BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
}
.badge-green { background: var(--green-bg); color: var(--green); border: 1px solid #14532d44; }
.badge-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid #45180344; }
.badge-blue { background: var(--blue-bg); color: var(--blue); border: 1px solid #1e3a5f44; }
.badge-red { background: var(--red-bg); color: var(--red); border: 1px solid #450a0a44; }
.badge-purple { background: #3b0764; color: var(--purple); border: 1px solid #581c8744; }
.badge-saffron { background: #431407; color: var(--saffron); border: 1px solid #7c2d1244; }

/* ── FORMS ── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--saffron);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-select option { background: var(--bg3); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

/* ── SEARCH ── */
.search-wrap { position: relative; }
.search-wrap input { padding-left: 36px; }
.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 15px;
  pointer-events: none;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
}
.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg2);
  z-index: 1;
}
.modal-title { font-size: 16px; font-weight: 600; }
.modal-body { padding: 20px 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* ── TABS ── */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab {
  padding: 10px 18px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
}
.tab:hover { color: var(--text2); }
.tab.active { color: var(--saffron); border-bottom-color: var(--saffron); }

/* ── VENDOR CARD (grid view) ── */
.vendor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.vendor-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
}
.vendor-card:hover { border-color: var(--saffron)66; transform: translateY(-1px); }
.vendor-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.vendor-name { font-size: 14px; font-weight: 600; }
.vendor-city { font-size: 12px; color: var(--text3); margin-top: 2px; }
.vendor-phone { font-size: 13px; color: var(--text2); margin-top: 8px; }
.vendor-rate { margin-top: 10px; font-size: 13px; }
.rate-cost { color: var(--text3); }
.rate-sell { color: var(--green); font-weight: 600; font-size: 15px; }

/* ── ITINERARY BUILDER ── */
.itin-day {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 14px;
  overflow: hidden;
}
.itin-day-header {
  background: var(--bg3);
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}
.day-label { font-size: 13px; font-weight: 600; color: var(--saffron); }
.day-title { font-size: 13px; color: var(--text2); }

.itin-drop-zone {
  min-height: 80px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.itin-drop-zone.drag-over {
  background: var(--saffron)08;
  border: 2px dashed var(--saffron)44;
  border-radius: 8px;
}
.drop-hint {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60px;
  color: var(--text3);
  font-size: 13px;
  border: 1px dashed var(--border2);
  border-radius: 8px;
}

.itin-item {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: grab;
  transition: all 0.1s;
}
.itin-item:hover { border-color: var(--saffron)44; }
.itin-item.dragging { opacity: 0.5; cursor: grabbing; }
.item-icon { font-size: 18px; width: 28px; text-align: center; }
.item-info { flex: 1; }
.item-name { font-size: 13px; font-weight: 500; }
.item-detail { font-size: 11px; color: var(--text3); margin-top: 2px; }
.item-price { font-size: 13px; font-weight: 600; color: var(--green); white-space: nowrap; }
.item-remove { color: var(--text3); cursor: pointer; padding: 4px; border-radius: 4px; }
.item-remove:hover { color: var(--red); background: var(--red-bg); }

/* ── SIDEBAR PANEL (vendor picker) ── */
.builder-layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; align-items: start; }
.vendor-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  position: sticky;
  top: 80px;
  max-height: calc(100vh - 100px);
  overflow-y: auto;
}
.vendor-panel-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  position: sticky;
  top: 0;
  background: var(--bg2);
}
.draggable-vendor {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: grab;
  display: flex;
  gap: 10px;
  align-items: center;
  transition: background 0.1s;
  font-size: 13px;
}
.draggable-vendor:hover { background: var(--bg3); }
.draggable-vendor:active { cursor: grabbing; }
.dv-icon { font-size: 16px; }
.dv-info .dv-name { font-weight: 500; }
.dv-info .dv-sub { font-size: 11px; color: var(--text3); }

/* ── TOAST ── */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 18px;
  font-size: 13px;
  box-shadow: var(--shadow);
  animation: slideIn 0.2s ease;
  display: flex;
  align-items: center;
  gap: 10px;
  max-width: 320px;
}
.toast.success { border-color: #14532d; }
.toast.error { border-color: #450a0a; }
@keyframes slideIn { from { transform: translateX(40px); opacity:0; } to { transform: translateX(0); opacity:1; } }

/* ── SETUP SCREEN ── */
.setup-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  padding: 20px;
}
.setup-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 480px;
  text-align: center;
}
.setup-logo { font-size: 48px; margin-bottom: 16px; }
.setup-title { font-size: 22px; font-weight: 700; color: var(--saffron); margin-bottom: 6px; }
.setup-sub { font-size: 14px; color: var(--text3); margin-bottom: 32px; }

/* ── ITINERARY PRINT ── */
@media print {
  .sidebar, .topbar, .topbar-actions, .no-print { display: none !important; }
  .main { margin-left: 0; }
  body { background: white; color: black; }
  .print-itinerary { display: block !important; }
}

.print-itinerary { display: none; }

/* ── LOADING ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
  color: var(--text3);
  font-size: 14px;
  gap: 10px;
}
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border2);
  border-top-color: var(--saffron);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-title { font-size: 15px; color: var(--text2); margin-bottom: 6px; }
.empty-sub { font-size: 13px; }

/* ── MARKUP CALC ── */
.markup-display {
  background: var(--bg3);
  border-radius: 8px;
  padding: 12px 16px;
  margin-top: 8px;
  font-size: 13px;
  color: var(--text2);
}
.markup-display .sell { color: var(--green); font-size: 18px; font-weight: 700; }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.filter-select {
  background: var(--bg2);
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 7px 12px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  outline: none;
}
.filter-select:focus { border-color: var(--saffron); }

/* ── STATUS COLORS ── */
.status-draft { color: var(--text3); }
.status-sent { color: var(--blue); }
.status-confirmed { color: var(--green); }
.status-cancelled { color: var(--red); }
</style>
</head>
<body>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- SETUP SCREEN (shown until Supabase connected) -->
<div class="setup-screen" id="setupScreen" style="display:none">
  <div class="setup-card">
    <div class="setup-logo">🕉️</div>
    <div class="setup-title">Saibaba Travels</div>
    <div class="setup-sub">Enter your Supabase credentials to connect</div>
    <div class="form-group" style="text-align:left">
      <label class="form-label">Supabase Project URL</label>
      <input class="form-input" id="setupUrl" placeholder="https://xxxx.supabase.co" />
    </div>
    <div class="form-group" style="text-align:left">
      <label class="form-label">Publishable Key</label>
      <input class="form-input" id="setupKey" placeholder="sb_publishable_..." />
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="connectSupabase()">Connect & Launch →</button>
    <div id="setupError" style="color:var(--red);font-size:13px;margin-top:12px"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none; width:100%; display:none">

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="brand">🕉️ Saibaba Travels</div>
    <div class="sub">Internal Portal</div>
  </div>
  <div style="flex:1; overflow-y:auto; padding-top:8px">
    <div class="nav-section">Overview</div>
    <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
      <span class="icon">◈</span> Dashboard
    </div>
    <div class="nav-section">Vendors</div>
    <div class="nav-item" onclick="navigate('hotels')" id="nav-hotels">
      <span class="icon">🏨</span> Hotels
    </div>
    <div class="nav-item" onclick="navigate('taxis')" id="nav-taxis">
      <span class="icon">🚗</span> Taxis & Transport
    </div>
    <div class="nav-item" onclick="navigate('activities')" id="nav-activities">
      <span class="icon">🎯</span> Activities
    </div>
    <div class="nav-section">Itineraries</div>
    <div class="nav-item" onclick="navigate('itineraries')" id="nav-itineraries">
      <span class="icon">🗺️</span> All Itineraries
    </div>
    <div class="nav-item" onclick="navigate('builder')" id="nav-builder">
      <span class="icon">✏️</span> Builder
    </div>
    <div class="nav-section">Settings</div>
    <div class="nav-item" onclick="navigate('markup')" id="nav-markup">
      <span class="icon">💰</span> Markup Rules
    </div>
  </div>
  <div class="sidebar-bottom">v1.0 · Free Plan</div>
</nav>

<!-- MAIN -->
<main class="main">
  <div id="pageContent"></div>
</main>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// SUPABASE SETUP
// ══════════════════════════════════════════
const SUPABASE_URL = 'https://rkdkrvzqghfipseoesfi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Rz2rxKj6fSo1a2z4RNquLQ_9RkLJwrV';

let sb;
let currentPage = 'dashboard';
let currentItinerary = null;
let draggedVendor = null;

async function init() {
  try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    // test connection
    const { error } = await sb.from('hotels').select('id').limit(1);
    if (error && error.code === '42P01') {
      // Tables don't exist yet — run setup
      await runDatabaseSetup();
    }
    document.getElementById('app').style.display = 'flex';
    navigate('dashboard');
  } catch(e) {
    document.getElementById('setupScreen').style.display = 'flex';
  }
}

async function runDatabaseSetup() {
  // Tables need to be created — Supabase free tier requires SQL Editor
  // We'll show instructions
  toast('First run! Please run the SQL setup via Supabase SQL Editor.', 'error');
}

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  
  const pages = {
    dashboard: renderDashboard,
    hotels: renderHotels,
    taxis: renderTaxis,
    activities: renderActivities,
    itineraries: renderItineraries,
    builder: renderBuilder,
    markup: renderMarkup,
  };
  if (pages[page]) pages[page]();
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span> ${msg}`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);

function openModal(title, body, footer = '') {

  document.getElementById('modalBody').innerHTML = body;

  document.getElementById('modalOverlay').style.display = 'flex';

// HELPERS
// ══════════════════════════════════════════
function selling(cost, markup) {
  return cost * (1 + markup / 100);
}
function fmtINR(n) {
  if (!n && n !== 0) return '—';
  return '₹' + Number(n).toLocaleString('en-IN', {maximumFractionDigits: 0});
}
function catBadge(cat) {
  const map = {
    'Budget': 'badge-blue', 'Standard': 'badge-blue',
    'Deluxe': 'badge-amber', 'Luxury': 'badge-purple', 'Heritage': 'badge-saffron',
    'Religious': 'badge-saffron', 'Cultural': 'badge-blue',
    'Adventure': 'badge-green', 'Food': 'badge-amber', 'Wellness': 'badge-purple',
    'Sightseeing': 'badge-blue', 'Shopping': 'badge-green', 'Other': 'badge-blue',
  };
  return `<span class="badge ${map[cat] || 'badge-blue'}">${cat}</span>`;
}

function filterHotels() {
  const q = (document.getElementById('hotelSearch')?.value || '').toLowerCase();
  const cat = document.getElementById('hotelCat')?.value || '';
  const state = document.getElementById('hotelState')?.value || '';
  let filtered = allHotels.filter(h => {

  const el = document.getElementById(prefix+'MarkupPreview');
  if (el && cost > 0) {
    el.innerHTML = `Cost ${fmtINR(cost)} + ${markup}% markup = <span class="sell">${fmtINR(sell)}</span> selling price`;
  }
}

async function saveHotel(id) {
  const data = {
    name: document.getElementById('hName').value.trim(),
    category: document.getElementById('hCat').value,
    city: document.getElementById('hCity').value.trim(),
    state: document.getElementById('hState').value.trim(),
    contact_person: document.getElementById('hCP').value.trim(),
    phone: document.getElementById('hPhone').value.trim(),
    email: document.getElementById('hEmail').value.trim(),
    whatsapp: document.getElementById('hWA').value.trim(),
    our_rate: parseFloat(document.getElementById('hRate').value) || null,
    markup_percent: parseFloat(document.getElementById('hMarkup').value) || 20,
    address: document.getElementById('hAddr').value.trim(),
    notes: document.getElementById('hNotes').value.trim(),
    updated_at: new Date().toISOString(),
  };
  if (!data.name || !data.city) { toast('Name and city are required', 'error'); return; }

  let error;
  if (id) {
    ({ error } = await sb.from('hotels').update(data).eq('id', id));
  } else {
    ({ error } = await sb.from('hotels').insert(data));
  }
  if (error) { toast('Save failed: ' + error.message, 'error'); return; }
  toast(id ? 'Hotel updated!' : 'Hotel added!');
  closeModal();
  loadHotels();
}

function editHotel(id) {
  closeModal();
  const h = allHotels.find(x => x.id === id);
  if (h) setTimeout(() => openAddHotel(h), 100);

async function deleteHotel(id) {
  if (!confirm('Delete this hotel?')) return;
  const { error } = await sb.from('hotels').delete().eq('id', id);
  if (error) { toast('Delete failed', 'error'); return; }
  toast('Hotel deleted');
  closeModal();
  loadHotels();
}

async function saveItinerary() {
  const client = document.getElementById('iClient').value.trim();
  if (!client) { toast('Client name required', 'error'); return; }
  const start = document.getElementById('iStart').value;
  const end = document.getElementById('iEnd').value;
  let numDays = 1;
  if (start && end) {
    numDays = Math.max(1, Math.ceil((new Date(end) - new Date(start)) / 86400000));
  }
  const data = {
    client_name: client,
    client_phone: document.getElementById('iPhone').value.trim(),
    client_email: document.getElementById('iEmail').value.trim(),
    destination: document.getElementById('iDest').value.trim(),
    start_date: start || null,
    end_date: end || null,
    num_pax: parseInt(document.getElementById('iPax').value) || 2,
    created_by: document.getElementById('iBy').value.trim(),
    notes: document.getElementById('iNotes').value.trim(),
    status: 'Draft',
  };
  const { data: itin, error } = await sb.from('itineraries').insert(data).select().single();
  if (error) { toast('Failed: ' + error.message, 'error'); return; }
  
  // Create day rows
  const days = [];
  for (let d = 0; d < numDays; d++) {
    let date = null;
    if (start) {
      const dt = new Date(start);
      dt.setDate(dt.getDate() + d);
      date = dt.toISOString().split('T')[0];
    }
    days.push({ itinerary_id: itin.id, day_number: d + 1, date, title: `Day ${d+1}` });
  }
  await sb.from('itinerary_days').insert(days);
  
  toast('Itinerary created!');
  closeModal();
  openBuilder(itin.id);
}

  if (!confirm('Delete this itinerary?')) return;
  await sb.from('itineraries').delete().eq('id', id);

  loadItineraries();
}

                  ${day.date ? `<span style="font-size:11px;color:var(--text3);margin-left:8px">${day.date}</span>` : ''}
                  <input class="form-input" value="${day.title||''}" style="width:180px;margin-left:10px;padding:4px 8px;font-size:12px" 
                    onchange="updateDayTitle('${day.id}',this.value)" placeholder="Day title..." />
                </div>
                <div style="display:flex;gap:6px">
                  <button class="btn btn-ghost btn-sm" onclick="addCustomItem('${day.id}')">+ Note</button>
                  <button class="btn btn-danger btn-sm" onclick="deleteDay('${day.id}')">🗑</button>
                </div>
              </div>
              <div class="itin-drop-zone" id="zone-${day.id}" 
                ondragover="event.preventDefault();document.getElementById('zone-${day.id}').classList.add('drag-over')"
                ondragleave="document.getElementById('zone-${day.id}').classList.remove('drag-over')"
                ondrop="handleDrop(event,'${day.id}')">
                ${(items[day.id] || []).length === 0 ? 
                  '<div class="drop-hint">← Drag hotels, taxis, or activities here</div>' :
                  (items[day.id] || []).map(item => renderItinItem(item, day.id)).join('')
                }
              </div>
            </div>`).join('')}
      </div>
      
      <!-- VENDOR PANEL -->
      <div class="vendor-panel">
        <div class="vendor-panel-header">🏨 Hotels</div>
        ${allVendors.hotels.length === 0 ? '<div style="padding:12px;font-size:12px;color:var(--text3)">No hotels added yet</div>' :
          allVendors.hotels.map(h => `
            <div class="draggable-vendor" draggable="true" 
              ondragstart="dragVendor(event,'hotel','${h.id}','${h.name.replace(/'/g,"\\'")}',${h.our_rate||0},${h.markup_percent||20})">
              <span class="dv-icon">🏨</span>
              <div class="dv-info">
                <div class="dv-name">${h.name}</div>
                <div class="dv-sub">${h.city} · ${fmtINR(selling(h.our_rate,h.markup_percent))}/night</div>
              </div>
            </div>`).join('')}
        
        <div class="vendor-panel-header">🚗 Taxis</div>
        ${allVendors.taxis.length === 0 ? '<div style="padding:12px;font-size:12px;color:var(--text3)">No taxis added yet</div>' :
          allVendors.taxis.map(t => `
            <div class="draggable-vendor" draggable="true"
              ondragstart="dragVendor(event,'taxi','${t.id}','${t.vendor_name.replace(/'/g,"\\'")}',${t.our_rate_per_day||0},${t.markup_percent||25})">
              <span class="dv-icon">🚗</span>
              <div class="dv-info">
                <div class="dv-name">${t.vendor_name}</div>
                <div class="dv-sub">${t.city} · ${fmtINR(selling(t.our_rate_per_day,t.markup_percent))}/day</div>
              </div>
            </div>`).join('')}
        
        <div class="vendor-panel-header">🎯 Activities</div>
        ${allVendors.activities.length === 0 ? '<div style="padding:12px;font-size:12px;color:var(--text3)">No activities yet</div>' :
          allVendors.activities.map(a => `
            <div class="draggable-vendor" draggable="true"
              ondragstart="dragVendor(event,'activity','${a.id}','${a.name.replace(/'/g,"\\'")}',${a.our_cost||0},${a.markup_percent||30})">
              <span class="dv-icon">🎯</span>
              <div class="dv-info">
                <div class="dv-name">${a.name}</div>
                <div class="dv-sub">${a.city} · ${a.our_cost > 0 ? fmtINR(selling(a.our_cost,a.markup_percent)) : 'Free'}</div>
              </div>
            </div>`).join('')}
      </div>
    </div>`;
}

function renderItinItem(item, dayId) {
  const icons = { hotel: '🏨', taxi: '🚗', activity: '🎯', note: '📝', meal: '🍽️', flight: '✈️' };
  return `<div class="itin-item" draggable="true" id="item-${item.id}">
    <span class="item-icon">${icons[item.item_type] || '📌'}</span>
    <div class="item-info">
      <div class="item-name">${item.custom_title || '—'}</div>
      <div class="item-detail">${item.item_type} ${item.our_cost > 0 ? '· cost ' + fmtINR(item.our_cost) : ''}</div>
    </div>
    <div class="item-price">${item.selling_price > 0 ? fmtINR(item.selling_price) : ''}</div>
    <span class="item-remove" onclick="removeItem('${item.id}','${dayId}')">✕</span>
  </div>`;
}

function dragVendor(event, type, id, name, cost, markup) {
  draggedVendor = { type, id, name, cost, markup };
  event.dataTransfer.effectAllowed = 'copy';
}

async function handleDrop(event, dayId) {
  event.preventDefault();
  document.getElementById('zone-' + dayId)?.classList.remove('drag-over');
  if (!draggedVendor) return;
  
  const { type, id, name, cost, markup } = draggedVendor;
  const sell = selling(cost, markup);
  const pax = builderData.itinerary?.num_pax || 1;
  
  const newItem = {
    day_id: dayId,
    item_type: type,
    vendor_id: id,
    custom_title: name,
    our_cost: cost,
    markup_percent: markup,
    selling_price: sell,
    num_pax: pax,
    sort_order: (builderData.items[dayId] || []).length,
  };
  
  const { data, error } = await sb.from('itinerary_items').insert(newItem).select().single();
  if (error) { toast('Failed to add item', 'error'); return; }
  
  if (!builderData.items[dayId]) builderData.items[dayId] = [];
  builderData.items[dayId].push(data);
  
  // Update totals on itinerary
  await recalcTotals();
  renderBuilderUI();
  draggedVendor = null;
  toast(`${name} added to day!`);
}

async function removeItem(itemId, dayId) {
  await sb.from('itinerary_items').delete().eq('id', itemId);
  builderData.items[dayId] = (builderData.items[dayId] || []).filter(i => i.id !== itemId);
  await recalcTotals();
  renderBuilderUI();
}

async function recalcTotals() {
  const totalCost = Object.values(builderData.items).flat().reduce((s, i) => s + (i.our_cost || 0), 0);
  const totalSell = Object.values(builderData.items).flat().reduce((s, i) => s + (i.selling_price || 0), 0);
  await sb.from('itineraries').update({ total_cost: totalCost, total_selling: totalSell }).eq('id', builderData.itinerary.id);
}

async function addDayToBuilder(itinId) {
  const dayNum = builderData.days.length + 1;
  let date = null;
  if (builderData.itinerary?.start_date) {
    const dt = new Date(builderData.itinerary.start_date);
    dt.setDate(dt.getDate() + dayNum - 1);
    date = dt.toISOString().split('T')[0];
  }
  const { data, error } = await sb.from('itinerary_days').insert({ itinerary_id: itinId, day_number: dayNum, date, title: `Day ${dayNum}` }).select().single();
  if (error) { toast('Failed to add day', 'error'); return; }
  builderData.days.push(data);
  builderData.items[data.id] = [];
  renderBuilderUI();
}

async function deleteDay(dayId) {
  if (!confirm('Delete this day and all its items?')) return;
  await sb.from('itinerary_days').delete().eq('id', dayId);
  builderData.days = builderData.days.filter(d => d.id !== dayId);
  delete builderData.items[dayId];
  await recalcTotals();
  renderBuilderUI();
}

async function updateDayTitle(dayId, title) {
  await sb.from('itinerary_days').update({ title }).eq('id', dayId);
  const day = builderData.days.find(d => d.id === dayId);
  if (day) day.title = title;
}

async function addCustomItem(dayId) {
  const note = prompt('Enter a note or custom item:');
  if (!note) return;
  const { data } = await sb.from('itinerary_items').insert({
    day_id: dayId, item_type: 'note', custom_title: note, our_cost: 0, selling_price: 0, sort_order: (builderData.items[dayId]||[]).length
  }).select().single();
  if (!builderData.items[dayId]) builderData.items[dayId] = [];
  builderData.items[dayId].push(data);
  renderBuilderUI();
}

async function updateItinStatus(id, status) {
  await sb.from('itineraries').update({ status }).eq('id', id);
  toast('Status updated to ' + status);
}

// ══════════════════════════════════════════
// MARKUP RULES
// ══════════════════════════════════════════
async function renderMarkup() {
  document.getElementById('pageContent').innerHTML = `
    <div class="topbar">
      <div><div class="page-title">💰 Markup Rules</div><div class="page-sub">Standard margins for each vendor type</div></div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openAddMarkup()">+ Add Rule</button>
      </div>
    </div>
    <div class="content" id="markupContent"><div class="loading"><div class="spinner"></div></div></div>`;
  await loadMarkup();
}

let allMarkup = [];
async function loadMarkup() {
  const { data } = await sb.from('markup_rules').select('*').order('created_at');
  allMarkup = data || [];
  const el = document.getElementById('markupContent');
  if (!el) return;
  if (allMarkup.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">💰</div><div class="empty-title">No markup rules yet</div></div>`;
    return;
  }
  el.innerHTML = `
    <div class="card table-wrap">
      <table>
        <thead><tr><th>Rule Name</th><th>Applies To</th><th>Markup %</th><th>Selling = Cost +</th><th>Default</th><th></th></tr></thead>
        <tbody>
          ${allMarkup.map(r => `<tr>
            <td style="font-weight:500">${r.rule_name}</td>
            <td>${r.vendor_type ? `<span class="badge badge-blue">${r.vendor_type}</span>` : 'All'}</td>
            <td style="font-size:16px;font-weight:700;color:var(--amber)">${r.markup_percent}%</td>
            <td style="color:var(--text3);font-size:13px">e.g. ₹1,000 cost → ₹${(1000*(1+r.markup_percent/100)).toFixed(0)} sell</td>
            <td>${r.is_default ? '<span class="badge badge-green">Default</span>' : ''}</td>
            <td>
              <button class="btn btn-ghost btn-sm" onclick="editMarkup('${r.id}')">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deleteMarkup('${r.id}')">🗑</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="card" style="margin-top:16px">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">💡 How markup works</div>
      <div style="font-size:13px;color:var(--text2);display:grid;gap:8px">
        <div>• <strong>Our Cost</strong> = what vendor charges us</div>
        <div>• <strong>Markup %</strong> = our profit margin added on top</div>
        <div>• <strong>Selling Price</strong> = Cost × (1 + Markup/100)</div>
        <div>• Example: Hotel costs ₹2,500 with 20% markup → sell at ₹3,000</div>
      </div>
    </div>`;
}

function openAddMarkup(existing = null) {
  const r = existing || {};
  openModal(existing ? '✏️ Edit Rule' : '💰 Add Markup Rule', `
    <div class="form-group">
      <label class="form-label">Rule Name *</label>
      <input class="form-input" id="mName" value="${r.rule_name||''}" placeholder="Default Hotel Markup" />
    </div>
    <div class="form-row"><div class="form-group">
      <label class="form-label">Applies To</label>
      <select class="form-select" id="mType">
        <option value="all" ${r.vendor_type==='all'?'selected':''}>All vendors</option>
        <option value="hotel" ${r.vendor_type==='hotel'?'selected':''}>Hotels</option>
        <option value="taxi" ${r.vendor_type==='taxi'?'selected':''}>Taxis</option>
        <option value="activity" ${r.vendor_type==='activity'?'selected':''}>Activities</option>
      </select>
    </div><div class="form-group">
      <label class="form-label">Markup %</label>
      <input class="form-input" id="mPct" type="number" value="${r.markup_percent||20}" oninput="updateMarkupPreview('m')" />
    </div></div>
    <div class="markup-display" id="mMarkupPreview"></div>
    <div class="form-group" style="margin-top:12px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
        <input type="checkbox" id="mDefault" ${r.is_default?'checked':''} /> Set as default for this type
      </label>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveMarkup('${r.id||''}')">💾 Save Rule</button>`
  );
  setTimeout(() => {
    const el = document.getElementById('mMarkupPreview');
    if (el) {
      const pct = r.markup_percent || 20;
      el.innerHTML = `₹1,000 cost + ${pct}% = <span class="sell">${fmtINR(1000*(1+pct/100))}</span> selling price`;
    }
  }, 50);
}

function editMarkup(id) {
  const r = allMarkup.find(x => x.id === id);
  if (r) openAddMarkup(r);
}

async function saveMarkup(id) {
  const data = {
    rule_name: document.getElementById('mName').value.trim(),
    vendor_type: document.getElementById('mType').value,
    markup_percent: parseFloat(document.getElementById('mPct').value) || 20,
    is_default: document.getElementById('mDefault').checked,
  };
  if (!data.rule_name) { toast('Rule name required', 'error'); return; }
  let error;
  if (id) ({ error } = await sb.from('markup_rules').update(data).eq('id', id));
  else ({ error } = await sb.from('markup_rules').insert(data));
  if (error) { toast('Save failed: ' + error.message, 'error'); return; }
  toast('Markup rule saved!');
  closeModal();
  loadMarkup();
}

async function deleteMarkup(id) {
  if (!confirm('Delete this rule?')) return;
  await sb.from('markup_rules').delete().eq('id', id);
  toast('Rule deleted');
  loadMarkup();
}

// PRINT ITINERARY

      .meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 4px; }
      .meta-value { font-size: 15px; font-weight: 600; }

      .day-label { font-weight: 700; font-size: 14px; }
      .day-date { font-size: 12px; opacity: 0.85; }
      .day-title { font-size: 13px; opacity: 0.9; }
      .day-items { border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 6px 6px; }
