<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saibaba Travels — Internal Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.344.0/font/lucide.min.css"/>
<style>
:root{
  --yellow:#FFD600;--yellow-dark:#E6BF00;--yellow-light:#FFF9CC;--yellow-pale:#FFFDE7;
  --black:#0D0D0D;--gray-900:#1A1A1A;--gray-800:#2C2C2C;--gray-700:#3F3F3F;
  --gray-600:#595959;--gray-400:#A0A0A0;--gray-300:#D0D0D0;--gray-200:#E8E8E8;
  --gray-100:#F4F4F4;--gray-50:#FAFAFA;--white:#FFFFFF;
  --green:#16A34A;--green-bg:#F0FDF4;--red:#DC2626;--red-bg:#FEF2F2;
  --blue:#2563EB;--blue-bg:#EFF6FF;--amber:#D97706;--amber-bg:#FFFBEB;
  --r:8px;--r-lg:12px;--shadow:0 1px 4px rgba(0,0,0,0.08);--shadow-lg:0 8px 24px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;background:var(--gray-50);color:var(--black);min-height:100vh;display:flex;font-size:14px;line-height:1.5;}

.sidebar{width:240px;min-height:100vh;background:var(--black);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;}
.sidebar-logo{padding:20px 20px 14px;border-bottom:1px solid rgba(255,255,255,0.07);}
.sidebar-brand{font-size:15px;font-weight:700;color:var(--yellow);letter-spacing:0.3px;}
.sidebar-tagline{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;}
.nav-section{padding:14px 20px 5px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.25);}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.55);transition:all 0.15s;border-left:2px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.9);}
.nav-item.active{background:rgba(255,214,0,0.08);color:var(--yellow);border-left-color:var(--yellow);}
.nav-item i{font-size:15px;width:16px;}
.sidebar-foot{margin-top:auto;padding:14px 20px;border-top:1px solid rgba(255,255,255,0.07);font-size:11px;color:rgba(255,255,255,0.25);}

.main{margin-left:240px;flex:1;min-height:100vh;}
.topbar{background:var(--white);border-bottom:1px solid var(--gray-200);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.page-title{font-size:15px;font-weight:600;}
.page-sub{font-size:12px;color:var(--gray-400);}
.topbar-actions{display:flex;gap:8px;}
.content{padding:24px 28px;}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s;white-space:nowrap;text-decoration:none;}
.btn i{font-size:14px;}
.btn-primary{background:var(--yellow);color:var(--black);}
.btn-primary:hover{background:var(--yellow-dark);}
.btn-black{background:var(--black);color:var(--white);}
.btn-black:hover{background:var(--gray-900);}
.btn-ghost{background:transparent;color:var(--gray-700);border:1px solid var(--gray-200);}
.btn-ghost:hover{background:var(--gray-100);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #FECACA;}
.btn-danger:hover{background:#FEE2E2;}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-icon{padding:7px;width:32px;height:32px;justify-content:center;}

.card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:20px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.stat-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:18px 22px;border-top:3px solid var(--yellow);}
.stat-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.8px;color:var(--gray-400);}
.stat-value{font-size:28px;font-weight:700;color:var(--black);margin-top:4px;line-height:1;}
.stat-sub{font-size:12px;color:var(--gray-400);margin-top:5px;}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--gray-400);border-bottom:1px solid var(--gray-200);background:var(--gray-50);white-space:nowrap;}
tbody td{padding:13px 14px;border-bottom:1px solid var(--gray-100);font-size:13px;vertical-align:middle;}
tbody tr:hover{background:var(--gray-50);}
tbody tr:last-child td{border-bottom:none;}

.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:500;}
.badge-yellow{background:var(--yellow-light);color:#7A6500;}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-red{background:var(--red-bg);color:var(--red);}
.badge-blue{background:var(--blue-bg);color:var(--blue);}
.badge-amber{background:var(--amber-bg);color:var(--amber);}
.badge-gray{background:var(--gray-100);color:var(--gray-600);}
.badge-black{background:var(--black);color:var(--white);}

.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--gray-700);margin-bottom:5px;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--white);border:1px solid var(--gray-200);color:var(--black);padding:9px 12px;border-radius:var(--r);font-size:13px;outline:none;transition:border-color 0.15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--yellow);box-shadow:0 0 0 3px rgba(255,214,0,0.12);}
.form-textarea{resize:vertical;min-height:76px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.form-hint{font-size:11px;color:var(--gray-400);margin-top:3px;}

.search-wrap{position:relative;}
.search-wrap input{padding-left:36px;}
.search-wrap .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--gray-400);font-size:15px;pointer-events:none;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--white);border-radius:var(--r-lg);width:100%;max-width:660px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--white);z-index:1;}
.modal-title{font-size:15px;font-weight:600;}
.modal-body{padding:18px 22px;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end;gap:8px;background:var(--gray-50);}

.filter-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.filter-select{background:var(--white);border:1px solid var(--gray-200);color:var(--black);padding:7px 12px;border-radius:var(--r);font-size:13px;cursor:pointer;outline:none;}
.filter-select:focus{border-color:var(--yellow);}

.vendor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;}
.vendor-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:18px;cursor:pointer;transition:all 0.15s;}
.vendor-card:hover{border-color:var(--yellow);box-shadow:0 2px 10px rgba(255,214,0,0.15);}
.vendor-name{font-size:14px;font-weight:600;}
.vendor-meta{font-size:12px;color:var(--gray-400);display:flex;align-items:center;gap:4px;margin-top:3px;}
.vendor-contact{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--gray-600);margin-top:7px;}
.vendor-contact i{font-size:13px;color:var(--gray-300);}
.price-strip{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-100);}
.price-cost{font-size:11px;color:var(--gray-400);}
.price-sell{font-size:16px;font-weight:700;color:var(--green);}
.price-margin{font-size:11px;background:var(--amber-bg);color:var(--amber);padding:2px 8px;border-radius:999px;}

/* Taxi vehicle pricing */
.vehicle-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.vchip{padding:5px 12px;border-radius:999px;border:1px solid var(--gray-200);font-size:12px;font-weight:500;cursor:pointer;color:var(--gray-600);background:var(--white);transition:all 0.15s;}
.vchip.on{background:var(--black);color:var(--white);border-color:var(--black);}
.v-pricing-block{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.v-pricing-block-title{font-size:12px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.v-pricing-block-title span{font-size:11px;color:var(--gray-400);font-weight:400;}
.pricing-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.pcell{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r);padding:8px;}
.pcell-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--gray-400);margin-bottom:4px;}
.pcell input{width:100%;border:none;outline:none;font-size:13px;font-weight:600;color:var(--black);background:transparent;text-align:center;padding:2px 0;}
.pcell-sell{font-size:11px;color:var(--green);text-align:center;margin-top:2px;min-height:16px;}

.calc-box{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r);padding:12px 14px;margin-top:6px;}
.calc-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;}
.calc-row.total{border-top:1px solid var(--gray-200);margin-top:5px;padding-top:8px;font-weight:600;font-size:15px;}
.calc-label{color:var(--gray-500);}
.calc-value{color:var(--black);}
.calc-value.g{color:var(--green);font-weight:700;}

.builder-layout{display:grid;grid-template-columns:1fr 268px;gap:18px;align-items:start;}
.itin-day{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-lg);margin-bottom:10px;overflow:hidden;}
.itin-day-hdr{background:var(--gray-50);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--gray-200);}
.day-pill{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#7A6500;background:var(--yellow-light);padding:2px 10px;border-radius:999px;}
.drop-zone{min-height:68px;padding:10px;display:flex;flex-direction:column;gap:6px;}
.drop-zone.over{background:var(--yellow-pale);border:2px dashed var(--yellow-dark);border-radius:var(--r);}
.drop-hint{display:flex;align-items:center;justify-content:center;gap:6px;min-height:48px;color:var(--gray-300);font-size:12px;border:1px dashed var(--gray-200);border-radius:var(--r);}
.itin-item{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r);padding:9px 12px;display:flex;align-items:center;gap:9px;cursor:grab;}
.itin-item:hover{border-color:var(--gray-300);}
.ii-icon{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ii-icon.hotel{background:var(--blue-bg);color:var(--blue);}
.ii-icon.taxi{background:var(--yellow-light);color:#7A6500;}
.ii-icon.activity{background:var(--green-bg);color:var(--green);}
.ii-icon.note{background:var(--gray-100);color:var(--gray-500);}
.ii-icon i{font-size:14px;}
.ii-name{font-size:13px;font-weight:500;flex:1;}
.ii-sub{font-size:11px;color:var(--gray-400);}
.ii-price{font-size:13px;font-weight:600;color:var(--green);}
.ii-rm{color:var(--gray-300);cursor:pointer;padding:3px;border-radius:4px;display:flex;}
.ii-rm:hover{color:var(--red);background:var(--red-bg);}

.vendor-panel{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-lg);position:sticky;top:78px;max-height:calc(100vh-100px);overflow-y:auto;}
.vp-section{padding:9px 14px 5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray-400);background:var(--gray-50);border-bottom:1px solid var(--gray-100);}
.drag-vendor{padding:9px 14px;border-bottom:1px solid var(--gray-100);cursor:grab;display:flex;align-items:center;gap:9px;transition:background 0.1s;}
.drag-vendor:hover{background:var(--gray-50);}
.dv-ic{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;}
.dv-ic.hotel{background:var(--blue-bg);color:var(--blue);}
.dv-ic.taxi{background:var(--yellow-light);color:#7A6500;}
.dv-ic.activity{background:var(--green-bg);color:var(--green);}
.dv-name{font-size:12px;font-weight:500;}
.dv-sub{font-size:11px;color:var(--gray-400);}

.toast-container{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:7px;}
.toast{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:11px 16px;font-size:13px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px;max-width:320px;animation:tIn 0.2s ease;}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}
.toast i{font-size:15px;}
.toast.success i{color:var(--green);}
.toast.error i{color:var(--red);}
@keyframes tIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--gray-400);font-size:13px;gap:10px;}
.spinner{width:17px;height:17px;border:2px solid var(--gray-200);border-top-color:var(--yellow-dark);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:60px 20px;}
.empty i{font-size:36px;color:var(--gray-200);margin-bottom:10px;display:block;}
.empty-title{font-size:14px;font-weight:500;color:var(--gray-500);margin-bottom:5px;}
.empty-sub{font-size:12px;color:var(--gray-400);}
.divider{height:1px;background:var(--gray-200);margin:14px 0;}
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-brand">Saibaba Travels</div>
    <div class="sidebar-tagline">Safety · Reliability · Luxury</div>
  </div>
  <div style="flex:1;overflow-y:auto;padding-top:6px">
    <div class="nav-section">Overview</div>
    <div class="nav-item active" onclick="nav('dashboard')" id="nav-dashboard"><i class="lucide-layout-dashboard"></i>Dashboard</div>
    <div class="nav-section">Vendors</div>
    <div class="nav-item" onclick="nav('hotels')" id="nav-hotels"><i class="lucide-building-2"></i>Hotels</div>
    <div class="nav-item" onclick="nav('taxis')" id="nav-taxis"><i class="lucide-car"></i>Taxis & Transport</div>
    <div class="nav-item" onclick="nav('activities')" id="nav-activities"><i class="lucide-map-pin"></i>Activities</div>
    <div class="nav-section">Itineraries</div>
    <div class="nav-item" onclick="nav('itineraries')" id="nav-itineraries"><i class="lucide-map"></i>All Itineraries</div>
    <div class="nav-item" onclick="nav('builder')" id="nav-builder"><i class="lucide-pencil-ruler"></i>Builder</div>
    <div class="nav-section">Settings</div>
    <div class="nav-item" onclick="nav('markup')" id="nav-markup"><i class="lucide-percent"></i>Markup Rules</div>
  </div>
  <div class="sidebar-foot">Internal Portal v2.0</div>
</nav>

<main class="main"><div id="pc"></div></main>

<div class="modal-overlay" id="mo" style="display:none" onclick="cmoo(event)">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="mt"></div><button class="btn btn-ghost btn-icon btn-sm" onclick="cm()"><i class="lucide-x"></i></button></div>
    <div class="modal-body" id="mb"></div>
    <div class="modal-footer" id="mf"></div>
  </div>
</div>

<script>
const SURL='https://rkdkrvzqghfipseoesfi.supabase.co',SKEY='sb_publishable_Rz2rxKj6fSo1a2z4RNquLQ_9RkLJwrV';
let sb,dragV=null,BD={itin:null,days:[],items:{}},AV={hotels:[],taxis:[],activities:[]};

const VTYPES=[
  {id:'hatchback',label:'Hatchback',seats:'4+1',ex:'WagonR, Swift'},
  {id:'sedan',label:'Sedan',seats:'4+1',ex:'Dzire, Etios'},
  {id:'suv',label:'SUV',seats:'6+1',ex:'Ertiga, Innova'},
  {id:'innova_crysta',label:'Innova Crysta',seats:'7+1',ex:'Toyota Innova Crysta'},
  {id:'tempo',label:'Tempo Traveller',seats:'12-17',ex:'Force Traveller'},
  {id:'mini_bus',label:'Mini Bus',seats:'20-26',ex:'Force Urbania'},
  {id:'luxury',label:'Luxury',seats:'4+1',ex:'Fortuner, Camry'},
];

async function init(){sb=supabase.createClient(SURL,SKEY);nav('dashboard');}

function nav(p){
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  const n=document.getElementById('nav-'+p);if(n)n.classList.add('active');
  ({dashboard:rdash,hotels:rhotels,taxis:rtaxis,activities:ract,itineraries:ritins,builder:rbuild,markup:rmarkup})[p]?.();
}

function toast(m,t='success'){
  const e=document.createElement('div');e.className=`toast ${t}`;
  e.innerHTML=`<i class="lucide-${t==='success'?'check-circle':'alert-circle'}"></i><span>${m}</span>`;
  document.getElementById('toastContainer').appendChild(e);setTimeout(()=>e.remove(),3200);
}
function om(title,body,footer=''){document.getElementById('mt').textContent=title;document.getElementById('mb').innerHTML=body;document.getElementById('mf').innerHTML=footer;document.getElementById('mo').style.display='flex';}
function cm(){document.getElementById('mo').style.display='none';}
function cmoo(e){if(e.target===document.getElementById('mo'))cm();}

const sell=(c,m)=>c*(1+m/100);
const inr=(n)=>(!n&&n!==0)?'—':'₹'+Number(n).toLocaleString('en-IN',{maximumFractionDigits:0});
function catBadge(c){const m={Budget:'badge-gray',Standard:'badge-blue',Deluxe:'badge-amber',Luxury:'badge-black',Heritage:'badge-yellow',Religious:'badge-yellow',Cultural:'badge-blue',Adventure:'badge-green',Food:'badge-amber',Wellness:'badge-blue',Sightseeing:'badge-gray',Shopping:'badge-gray',Other:'badge-gray'};return`<span class="badge ${m[c]||'badge-gray'}">${c}</span>`;}
function stBadge(s){const m={Draft:'badge-gray',Sent:'badge-blue',Confirmed:'badge-green',Cancelled:'badge-red'};return`<span class="badge ${m[s]||'badge-gray'}">${s}</span>`;}

// ── DASHBOARD ──
async function rdash(){
  document.getElementById('pc').innerHTML=`<div class="topbar"><div><div class="page-title">Dashboard</div><div class="page-sub">Saibaba Travels Internal Portal</div></div></div><div class="content" id="dc"><div class="loading"><div class="spinner"></div>Loading...</div></div>`;
  const[H,T,A,I]=await Promise.all([sb.from('hotels').select('id,is_active').then(r=>r.data||[]),sb.from('taxis').select('id,is_active').then(r=>r.data||[]),sb.from('activities').select('id,is_active').then(r=>r.data||[]),sb.from('itineraries').select('id,status,total_selling,client_name').then(r=>r.data||[])]);
  const rev=I.filter(i=>i.status==='Confirmed').reduce((s,i)=>s+(i.total_selling||0),0);
  document.getElementById('dc').innerHTML=`
    <div class="grid-4" style="margin-bottom:22px">
      <div class="stat-card"><div class="stat-label">Hotels</div><div class="stat-value">${H.length}</div><div class="stat-sub">${H.filter(h=>h.is_active).length} active</div></div>
      <div class="stat-card"><div class="stat-label">Taxis</div><div class="stat-value">${T.length}</div><div class="stat-sub">${T.filter(t=>t.is_active).length} active</div></div>
      <div class="stat-card"><div class="stat-label">Activities</div><div class="stat-value">${A.length}</div><div class="stat-sub">${A.filter(a=>a.is_active).length} active</div></div>
      <div class="stat-card"><div class="stat-label">Confirmed Revenue</div><div class="stat-value" style="font-size:20px">${inr(rev)}</div><div class="stat-sub">${I.filter(i=>i.status==='Confirmed').length} confirmed trips</div></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div style="font-size:14px;font-weight:600;margin-bottom:14px">Quick Actions</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-primary" onclick="nav('hotels');setTimeout(oah,100)"><i class="lucide-plus"></i>Add Hotel Vendor</button>
          <button class="btn btn-ghost" onclick="nav('taxis');setTimeout(oat,100)"><i class="lucide-plus"></i>Add Taxi Vendor</button>
          <button class="btn btn-ghost" onclick="nav('activities');setTimeout(oaa,100)"><i class="lucide-plus"></i>Add Activity</button>

  const sd=document.getElementById('isd').value,ed=document.getElementById('ied').value;

  const{data:it,error}=await sb.from('itineraries').insert({client_name:cl,client_phone:document.getElementById('iph').value.trim(),client_email:document.getElementById('iem').value.trim(),destination:document.getElementById('ides').value.trim(),start_date:sd||null,end_date:ed||null,num_pax:parseInt(document.getElementById('ipx').value)||2,created_by:document.getElementById('iby').value.trim(),notes:document.getElementById('int').value.trim(),status:'Draft'}).select().single();

function dv2(ev,type,id,name,cost,markup){dragV={type,id,name,cost,markup};ev.dataTransfer.effectAllowed='copy';}
async function hDrop(ev,dayId){
  ev.preventDefault();document.getElementById('zone-'+dayId)?.classList.remove('over');
  if(!dragV)return;
  const{type,id,name,cost,markup}=dragV;
  const{data,error}=await sb.from('itinerary_items').insert({day_id:dayId,item_type:type,vendor_id:id,custom_title:name,our_cost:cost,markup_percent:markup,selling_price:sell(cost,markup),num_pax:BD.itin?.num_pax||1,sort_order:(BD.items[dayId]||[]).length}).select().single();
  if(error){toast('Failed','error');return;}
  if(!BD.items[dayId])BD.items[dayId]=[];BD.items[dayId].push(data);
  await rcTotals();rbuilderUI();dragV=null;toast(`${name} added!`);
}
async function rmItem(iid,dayId){
  await sb.from('itinerary_items').delete().eq('id',iid);
  BD.items[dayId]=(BD.items[dayId]||[]).filter(i=>i.id!==iid);await rcTotals();rbuilderUI();
}
async function rcTotals(){
  const tc=Object.values(BD.items).flat().reduce((s,i)=>s+(i.our_cost||0),0);
  const ts=Object.values(BD.items).flat().reduce((s,i)=>s+(i.selling_price||0),0);
  await sb.from('itineraries').update({total_cost:tc,total_selling:ts}).eq('id',BD.itin.id);
}
async function addDay(itId){
  const n=BD.days.length+1;let dt=null;
  if(BD.itin?.start_date){const x=new Date(BD.itin.start_date);x.setDate(x.getDate()+n-1);dt=x.toISOString().split('T')[0];}
  const{data,error}=await sb.from('itinerary_days').insert({itinerary_id:itId,day_number:n,date:dt,title:`Day ${n}`}).select().single();
  if(error){toast('Failed','error');return;}BD.days.push(data);BD.items[data.id]=[];rbuilderUI();
}
async function delDay(did){if(!confirm('Delete day and all items?'))return;await sb.from('itinerary_days').delete().eq('id',did);BD.days=BD.days.filter(d=>d.id!==did);delete BD.items[did];await rcTotals();rbuilderUI();}
async function updDayT(did,t){await sb.from('itinerary_days').update({title:t}).eq('id',did);}
async function addNote(dayId){const n=prompt('Note or custom item:');if(!n)return;const{data}=await sb.from('itinerary_items').insert({day_id:dayId,item_type:'note',custom_title:n,our_cost:0,selling_price:0,sort_order:(BD.items[dayId]||[]).length}).select().single();if(!BD.items[dayId])BD.items[dayId]=[];BD.items[dayId].push(data);rbuilderUI();}
async function updItSt(id,s){await sb.from('itineraries').update({status:s}).eq('id',id);toast('Status: '+s);}

// ── MARKUP ──
let AMK=[];
async function rmarkup(){
  document.getElementById('pc').innerHTML=`
    <div class="topbar"><div><div class="page-title">Markup Rules</div><div class="page-sub">Standard margins per vendor type</div></div><div class="topbar-actions"><button class="btn btn-primary" onclick="oamk()"><i class="lucide-plus"></i>Add Rule</button></div></div>
    <div class="content" id="mkc"><div class="loading"><div class="spinner"></div></div></div>`;
  const{data}=await sb.from('markup_rules').select('*').order('created_at');AMK=data||[];rmkl();
}
function rmkl(){
  const el=document.getElementById('mkc');if(!el)return;
  if(!AMK.length){el.innerHTML=`<div class="empty"><i class="lucide-percent"></i><div class="empty-title">No markup rules</div></div>`;return;}
  el.innerHTML=`<div class="card table-wrap" style="margin-bottom:18px">
    <table><thead><tr><th>Rule Name</th><th>Vendor Type</th><th>Markup %</th><th>Example</th><th>Default</th><th></th></tr></thead>
    <tbody>${AMK.map(r=>`<tr>
      <td style="font-weight:500">${r.rule_name}</td>
      <td>${r.vendor_type?`<span class="badge badge-gray">${r.vendor_type}</span>`:'All'}</td>
      <td><span style="font-size:18px;font-weight:700;color:var(--amber)">${r.markup_percent}%</span></td>
      <td style="font-size:12px;color:var(--gray-400)">₹1,000 → ${inr(1000*(1+r.markup_percent/100))} sell</td>
      <td>${r.is_default?'<span class="badge badge-green">Default</span>':''}</td>
      <td><div style="display:flex;gap:5px"><button class="btn btn-ghost btn-sm" onclick="emk('${r.id}')"><i class="lucide-pencil"></i></button><button class="btn btn-danger btn-sm" onclick="dmk('${r.id}')"><i class="lucide-trash-2"></i></button></div></td>
    </tr>`).join('')}</tbody></table></div>`;
}
function oamk(ex=null){
  const r=ex||{};
  om(ex?'Edit Rule':'Add Markup Rule',`
    <div class="form-group"><label class="form-label">Rule Name *</label><input class="form-input" id="mn" value="${r.rule_name||''}" placeholder="Default Hotel Markup"/></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Applies To</label><select class="form-select" id="mtp"><option value="all" ${r.vendor_type==='all'?'selected':''}>All</option><option value="hotel" ${r.vendor_type==='hotel'?'selected':''}>Hotels</option><option value="taxi" ${r.vendor_type==='taxi'?'selected':''}>Taxis</option><option value="activity" ${r.vendor_type==='activity'?'selected':''}>Activities</option></select></div>
    <div class="form-group"><label class="form-label">Markup %</label><input class="form-input" id="mp" type="number" value="${r.markup_percent||20}" oninput="cmk()"/></div></div>
    <div id="mkcalc"></div>
    <div class="form-group" style="margin-top:10px"><label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px"><input type="checkbox" id="md" ${r.is_default?'checked':''}/>Set as default for this type</label></div>`,
    `<button class="btn btn-ghost" onclick="cm()">Cancel</button><button class="btn btn-primary" onclick="smk('${r.id||''}')"><i class="lucide-save"></i>Save</button>`);
  setTimeout(cmk,50);
}
function cmk(){const p=parseFloat(document.getElementById('mp')?.value)||0;const el=document.getElementById('mkcalc');if(el)el.innerHTML=`<div class="calc-box"><div class="calc-row"><span class="calc-label">₹1,000 cost</span><span class="calc-value g">${inr(1000*(1+p/100))} sell price</span></div></div>`;}
function emk(id){const r=AMK.find(x=>x.id===id);if(r)oamk(r);}
async function smk(id){
  const data={rule_name:document.getElementById('mn').value.trim(),vendor_type:document.getElementById('mtp').value,markup_percent:parseFloat(document.getElementById('mp').value)||20,is_default:document.getElementById('md').checked};
  if(!data.rule_name){toast('Name required','error');return;}
  const{error}=id?await sb.from('markup_rules').update(data).eq('id',id):await sb.from('markup_rules').insert(data);
  if(error){toast('Save failed: '+error.message,'error');return;}
  toast('Saved!');cm();const{data:d}=await sb.from('markup_rules').select('*').order('created_at');AMK=d||[];rmkl();
}
async function dmk(id){if(!confirm('Delete?'))return;await sb.from('markup_rules').delete().eq('id',id);toast('Deleted');const{data:d}=await sb.from('markup_rules').select('*').order('created_at');AMK=d||[];rmkl();}

// ── PRINT ──

  const{data:it}=await sb.from('itineraries').select('*').eq('id',id).single();

  .db{margin-bottom:20px;}.dh{background:#0D0D0D;color:white;padding:9px 14px;border-radius:6px 6px 0 0;display:flex;justify-content:space-between;}
  .dl{font-weight:700;font-size:12px;}.dd{font-size:11px;opacity:0.6;}

  .di{padding:11px 14px;border-bottom:1px solid #f5f5f5;display:flex;gap:10px;align-items:flex-start;}
  .di:last-child{border-bottom:none;}.dic{font-size:16px;width:22px;}
  .din{font-weight:500;font-size:13px;flex:1;}.dip{font-weight:700;color:#16A34A;font-size:13px;}
  .tbox{background:#F0FDF4;border:2px solid #16A34A;border-radius:8px;padding:14px 20px;margin-top:20px;display:flex;justify-content:space-between;align-items:center;}
  .tv{font-size:24px;font-weight:700;color:#16A34A;}
  .ft{text-align:center;margin-top:32px;padding-top:16px;border-top:1px solid #e5e7eb;color:#aaa;font-size:11px;}
  @media print{body{print-color-adjust:exact;-webkit-print-color-adjust:exact;}}</style>
  </head><body><div class="pg">
  <div class="hdr"><div><div class="bn">Saibaba Travels</div><div class="bt">Safety · Reliability · Luxury</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:600;color:#888">Travel Itinerary</div><div style="font-size:11px;color:#aaa;margin-top:3px">Ref: ${it.id.slice(0,8).toUpperCase()}</div></div></div>
  <div class="meta">
    <div><div class="ml">Prepared For</div><div class="mv">${it.client_name}</div></div>
    <div><div class="ml">Destination</div><div class="mv">${it.destination||'—'}</div></div>
    <div><div class="ml">Travel Dates</div><div class="mv">${it.start_date||'—'} to ${it.end_date||'—'}</div></div>
    <div><div class="ml">Travellers</div><div class="mv">${it.num_pax} Pax</div></div>
    <div><div class="ml">Status</div><div class="mv">${it.status}</div></div>
    ${it.created_by?`<div><div class="ml">Prepared By</div><div class="mv">${it.created_by}</div></div>`:''}
  </div>
  ${ai.map(({day:d,items})=>`<div class="db">
    <div class="dh"><div><span class="dl">Day ${d.day_number}</span>${d.title&&d.title!='Day '+d.day_number?` <span style="font-size:11px;opacity:0.8">— ${d.title}</span>`:''}</div>${d.date?`<span class="dd">${d.date}</span>`:''}</div>
    <div class="dit">${!items.length?'<div class="di" style="color:#aaa;font-size:12px">No items</div>':items.map(i=>`<div class="di"><span class="dic">${ic[i.item_type]||'📌'}</span><span class="din">${i.custom_title||'—'}</span>${i.selling_price>0?`<span class="dip">₹${Number(i.selling_price).toLocaleString('en-IN')}</span>`:''}</div>`).join('')}</div>
  </div>`).join('')}
  ${it.total_selling>0?`<div class="tbox"><div><div style="font-size:13px;color:#555">Total Package Price</div><div style="font-size:11px;color:#888">Inclusive of all charges</div></div><div class="tv">₹${Number(it.total_selling).toLocaleString('en-IN')}</div></div>`:''}

window.addEventListener('DOMContentLoaded',init);
